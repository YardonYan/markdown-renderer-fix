import pandas as pd
import numpy as np
from datetime import datetime

# 读取销售数据
df = pd.read_csv('sales_2024.csv')

df['date'] = pd.to_datetime(df['date'])
df['amount'] = df['amount'].astype(float)

monthly = df.groupby(df['date'].dt.to_period('M')).agg({
    'amount': ['sum', 'mean', 'count']
}).round(2)

print(f"总销售额: ¥{df['amount'].sum():,.2f}")

// 并行获取用户数据
async function fetchUserData(userIds) {
  try {
    const promises = userIds.map(id =>
      fetch(\`/api/v1/users/\${id}\`).then(r => r.json())
    );
    const users = await Promise.all(promises);
    return users.map(u => ({
      id: u.id, name: u.name,
      email: u.email, avatar: u.avatar_url
    }));
  } catch (err) {
    console.error('获取用户数据失败:', err);
    throw new Error('数据加载失败，请稍后重试');
  }
}

## SQL 查询优化

\`\`\`sql
-- 查询近 30 天活跃用户 TOP 100
WITH active_users AS (
  SELECT user_id,
    COUNT(*) AS login_count,
    MAX(login_time) AS last_login
  FROM user_logins
  WHERE login_time >= DATEADD(day, -30, GETDATE())
  GROUP BY user_id
  HAVING COUNT(*) >= 5
)
SELECT u.username, u.email,
  a.login_count, a.last_login
FROM active_users a
JOIN users u ON a.user_id = u.id
ORDER BY a.login_count DESC
LIMIT 100;
\`\`\`

## 一、代数与方程

### 二次方程求根公式

一元二次方程 $ax^2 + bx + c = 0$（其中 $a \\neq 0$）的解：

$$x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}$$

判别式 $\\Delta = b^2 - 4ac$ 决定根的性质：
- $\\Delta > 0$ → 两个不相等的实数根
- $\\Delta = 0$ → 两个相等的实数根
- $\\Delta < 0$ → 一对共轭复数根

### 韦达定理

若 $x_1, x_2$ 是 $ax^2+bx+c=0$ 的两根，则：

$$x_1 + x_2 = -\\frac{b}{a}, \\quad x_1 x_2 = \\frac{c}{a}$$

### Python

\`\`\`python
import requests

resp = requests.post(
    'https://api.example.com/v1/auth/login',
    json={'username': 'admin', 'password': 'xxx', 'captcha': '42A7'}
)
token = resp.json()['data']['token']

headers = {'Authorization': f'Bearer {token}'}
users = requests.get(
    'https://api.example.com/v1/users',
    headers=headers,
    params={'page': 1, 'size': 10}
)
print(users.json())

marked.setOptions({breaks:true,gfm:true,headerIds:false});
mermaid.initialize({startOnLoad:false,theme:'default'});

function renderMd(container,text,isFull){
  const html=marked.parse(text);
  // DOMPurify 净化（XSS 防护）
  let clean=html;
  if(typeof DOMPurify!=='undefined'){
    try{clean=DOMPurify.sanitize(html,{
      ALLOWED_TAGS:['h1','h2','h3','h4','h5','h6','p','br','ul','ol','li','strong','em','del','a','code','pre','blockquote','table','thead','tbody','tr','th','td','img','span','div','hr','sup','sub','input'],
      ALLOWED_ATTR:['href','src','class','id','target','alt','title','type','checked','disabled'],
      ALLOW_DATA_ATTR:false
    });}catch(e){}
  }
  container.innerHTML=clean;
  // Code blocks
  container.querySelectorAll('pre code').forEach(b=>{
    const pre=b.parentElement,w=document.createElement('div');
    w.className='code-block-wrapper';
    const lang=(b.className.match(/language-(\w+)/)||[])[1]||'text';
    const h=document.createElement('div');h.className='code-block-header';
    h.innerHTML='<span class="code-lang">'+lang+'</span><button class="copy-btn" onclick="copyCode(this)">📋 复制</button>';
    pre.parentNode.insertBefore(w,pre);w.appendChild(h);w.appendChild(pre);
  });
  setTimeout(()=>container.querySelectorAll('pre code').forEach(b=>{if(typeof hljs!=='undefined')hljs.highlightElement(b)}),50);
  if(typeof renderMathInElement!=='undefined'){
    try{renderMathInElement(container,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],throwOnError:false});}catch(e){}
  }
  // Mermaid: move text from code blocks to div
  container.querySelectorAll('.language-mermaid').forEach(b=>{
    const pre=b.parentElement,g=document.createElement('div');
    g.className='mermaid';g.textContent=b.textContent;
    pre.parentNode.replaceChild(g,pre);
  });
  // ✅ 仅对当前卡片内的 Mermaid 图表执行渲染（作用域限定）
  if(isFull) setTimeout(()=>{try{
    const mermaidNodes=container.querySelectorAll('.mermaid');
    if(mermaidNodes.length>0)mermaid.run({nodes:mermaidNodes}).catch(()=>{});
  }catch(e){}},100);
}

function copyToClipboard(text,onSuccess,onError){
  function fallback(){
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:-9999px';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy')?onSuccess():onError();}catch(e){onError();}
    document.body.removeChild(ta);
  }
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(onSuccess).catch(()=>fallback());
  }else{fallback();}
}

function copyCode(btn){
  const wrapper=btn.closest('.code-block-wrapper');
  if(!wrapper)return;
  const codeEl=wrapper.querySelector('code');
  if(!codeEl)return;
  const code=codeEl.textContent;
  if(btn._ct){clearTimeout(btn._ct);btn._ct=null;}
  copyToClipboard(code,
    ()=>{btn.textContent='✅ 已复制';btn._ct=setTimeout(()=>btn.textContent='📋 复制',1500);},
    ()=>{btn.textContent='❌ 失败';btn._ct=setTimeout(()=>btn.textContent='📋 复制',1500);}
  );
}

  const preview=document.createElement('div');preview.className='card-preview';
  const previewContent=document.createElement('div');previewContent.className='md-content';
  preview.appendChild(previewContent);

  const full=document.createElement('div');full.className='card-full';
  const fullContent=document.createElement('div');fullContent.className='md-content';
  full.appendChild(fullContent);

  card.appendChild(close);card.appendChild(header);card.appendChild(preview);card.appendChild(full);

  card.onclick=function(e){
    if(e.target.closest('.close-btn'))return;
    expandCard(card,c.id);
  };

  gallery.appendChild(card);

  // Render preview immediately
  renderMd(previewContent,c.md,false);
});

/* ═══════════════════════ Card Actions ═══════════════════════ */
function expandCard(card,id){
  if(card.classList.contains('expanded'))return;
  // Collapse others
  document.querySelectorAll('.card.expanded').forEach(c=>collapseCard(c));
  card.classList.add('expanded');
  const full=card.querySelector('.card-full .md-content');
  if(!full.dataset.rendered){
    const data=cards.find(c=>c.id===id);
    renderMd(full,data.md,true);
    full.dataset.rendered='1';
    // 添加复制卡片内容按钮
    const existingBtn=card.querySelector('.copy-card-btn');
    if(existingBtn) existingBtn.remove();
    const copyBtn=document.createElement('button');
    copyBtn.className='copy-card-btn';
    copyBtn.textContent='📋 复制卡片内容';
    copyBtn.onclick=function(e){
      e.stopPropagation();
      copyToClipboard(data.md,
        ()=>{copyBtn.textContent='✅ 已复制';setTimeout(()=>copyBtn.textContent='📋 复制卡片内容',1500);},
        ()=>{copyBtn.textContent='❌ 失败';setTimeout(()=>copyBtn.textContent='📋 复制卡片内容',1500);}
      );
    };
    full.parentNode.appendChild(copyBtn);
  }
  setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

function collapseCard(card){
  card.classList.remove('expanded');
}

/* ═══════════════════════ Filter ═══════════════════════ */
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const f=btn.dataset.filter;
    document.querySelectorAll('.card').forEach(card=>{
      const hide=(f!=='all'&&card.dataset.category!==f);
      if(hide){
        // 过滤隐藏时同步收起展开状态，避免重新显示时以展开态出现
        card.classList.remove('expanded');
        card.style.display='none';
      }else{
        card.style.display='';
      }
    });
  });
});
